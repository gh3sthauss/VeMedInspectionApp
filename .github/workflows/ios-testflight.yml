name: iOS TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          for i in 1 2 3; do
            pod install && break
            echo "pod install failed (attempt $i), retrying in 30s..."
            sleep 30
          done

      - name: Build Flutter iOS frameworks
        # Build number must always exceed the highest one on App Store
        # Connect (FlutterFlow's old deploys reached 6). run_number is
        # monotonic per workflow; the offset keeps us clear of history.
        run: flutter build ios --release --no-codesign --build-number=$((100 + ${{ github.run_number }}))

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > ios/fastlane/AuthKey.p8

      - name: Write iOS distribution certificate
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
        run: echo "$IOS_CERT_P12_BASE64" | base64 --decode > ios/fastlane/ios_distribution.p12

      - name: Install fastlane
        run: gem install fastlane -N

      - name: Build and upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_PATH: ${{ github.workspace }}/ios/fastlane/AuthKey.p8
          IOS_CERT_P12_PATH: ${{ github.workspace }}/ios/fastlane/ios_distribution.p12
          IOS_CERT_P12_PASSWORD: ${{ secrets.IOS_CERT_P12_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: cd ios && fastlane beta
